{% extends 'journal_app/base.html' %}

{% block 'content' %}
    <main>
        <h1 id="entry-title">{{entry.entry_title}}</h1>
        <p id="entry-topic"><strong>Topic: </strong>{{entry.topic}}</p>
        <p id="entry-text">{{entry.entry_text}}</p>
        <p>Date added: <time datetime="{{entry.date_added.isoformat}}">{{entry.date_added}}</time></p>
    </main>

    <a href="{% url 'journal_app:edit' entry.id %}">Edit</a>

{% endblock %}
